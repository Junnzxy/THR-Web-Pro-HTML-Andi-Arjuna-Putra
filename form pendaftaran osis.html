<!DOCTYPE html>
<html lang="id">
<head><title>Form OSIS</title></head>
<body style="font-family:'Times New Roman',serif">

<table border="1" cellspacing="0" width="600" align="center">
  <tr><td>
    <table bgcolor="blue" width="100%" cellpadding="10">
      <tr align="center"><td><b><font color="white" size="4">FORM PENDAFTARAN OSIS</font></b></td></tr>
    </table>

    <form>
      <table cellpadding="12" width="100%">
        <tr><td>Nama Lengkap</td><td><input type="text" placeholder="Nama Lengkap"></td></tr>

        <tr><td>Nama Panggilan</td><td><input type="text" placeholder="Nama Panggilan"></td></tr>

        <tr><td>Tempat Tanggal Lahir</td><td><input type="text" placeholder="dd/mm/yyyy"></td></tr>

        <tr><td>Jenis Kelamin</td>
          <td><b>Laki-Laki</b> <input type="radio" name="jk"> <b>Perempuan</b> <input type="radio" name="jk"></td>
        </tr>

        <tr><td>Nomor Telepon</td><td><input type="text" placeholder="Telepon"></td></tr>

        <tr><td>Jurusan</td>
          <td><b>IPA</b> <input type="radio" name="j"> <b>IPS</b> <input type="radio" name="j"> <b>BAHASA</b> <input type="radio" name="j"></td>
        </tr>

        <tr><td>Agama</td>
          <td><select><option>Islam</option><option>Kristen</option><option>Lainnya</option></select></td>
        </tr>

        <tr><td>Hobi</td>
          <td><b>Baca Buku</b> <input type="checkbox"> <b>Menulis</b> <input type="checkbox"> <b>dll</b> <input type="checkbox"></td>
        </tr>

        <tr><td>Alasan/Motivasi</td><td><textarea rows="5" cols="35"></textarea></td></tr>
        <tr><td>Foto 3X4</td><td><input type="file"></td></tr>

        <tr align="center"><td colspan="2">
          <input type="submit" value="Daftar" style="font-weight:bold; padding:5px 15px">
          <input type="reset" value="Reset" style="font-weight:bold; padding:5px 15px">
        </td></tr>
        
      </table>
    </form>
  </td></tr>
</table>

</body>
</html>
